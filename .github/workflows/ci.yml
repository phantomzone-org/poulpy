name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout
      uses: actions/checkout@v4
      with:
        submodules: recursive

    - name: Install pinned Rust nightly
      uses: dtolnay/rust-toolchain@master
      with:
        toolchain: nightly-2026-03-21
        components: clippy, rustfmt

    - name: Cache cargo deps
      uses: actions/cache@v4
      with:
        path: |
          ~/.cargo/registry
          ~/.cargo/git
          target
        key: ${{ runner.os }}-cargo-${{ hashFiles('**/Cargo.lock') }}
        restore-keys: |
          ${{ runner.os }}-cargo-

    # Detect whether runner supports AVX2 + FMA
    - name: Detect AVX support
      id: avxcheck
      run: |
        if lscpu | grep -qi avx2 && lscpu | grep -qi fma; then
          echo "supported=true" >> $GITHUB_OUTPUT
        else
          echo "supported=false" >> $GITHUB_OUTPUT
        fi

    # Detect whether runner has a CUDA-capable GPU
    - name: Detect CUDA support
      id: cudacheck
      run: |
        if command -v nvidia-smi &>/dev/null && nvidia-smi -L &>/dev/null; then
          echo "supported=true" >> $GITHUB_OUTPUT
        else
          echo "supported=false" >> $GITHUB_OUTPUT
        fi

    # rustfmt always runs — unrelated to AVX/CUDA support
    - name: rustfmt (check only)
      run: cargo fmt --all --check

    # Build / lint / test WITH AVX (poulpy-gpu-cuda excluded — needs CUDA device)
    - name: Build (AVX enabled)
      if: steps.avxcheck.outputs.supported == 'true'
      run: |
        RUSTFLAGS="-C target-feature=+avx2,+fma" \
        cargo build --workspace --all-targets --features enable-avx --exclude poulpy-gpu-cuda

    - name: Clippy (AVX enabled)
      if: steps.avxcheck.outputs.supported == 'true'
      run: |
        RUSTFLAGS="-C target-feature=+avx2,+fma" \
        cargo clippy --workspace --all-targets --features enable-avx --exclude poulpy-gpu-cuda -- -D warnings

    - name: Tests (AVX enabled)
      if: steps.avxcheck.outputs.supported == 'true'
      run: |
        RUSTDOCFLAGS="-C target-feature=+avx2 -C target-feature=+fma" \
        RUSTFLAGS="-C target-feature=+avx2,+fma" \
        cargo test --workspace --features enable-avx --exclude poulpy-gpu-cuda

    # Build / lint / test WITHOUT AVX (poulpy-gpu-cuda excluded — needs CUDA device)
    - name: Build (portable mode)
      if: steps.avxcheck.outputs.supported == 'false'
      run: cargo build --workspace --all-targets --exclude poulpy-gpu-cuda

    - name: Clippy (portable mode)
      if: steps.avxcheck.outputs.supported == 'false'
      run: cargo clippy --workspace --all-targets --exclude poulpy-gpu-cuda -- -D warnings

    - name: Tests (portable mode)
      if: steps.avxcheck.outputs.supported == 'false'
      run: cargo test --workspace --exclude poulpy-gpu-cuda

    # Build / lint / test poulpy-gpu-cuda — only when a CUDA device is present
    - name: Build poulpy-gpu-cuda
      if: steps.cudacheck.outputs.supported == 'true'
      run: cargo build -p poulpy-gpu-cuda --all-targets

    - name: Clippy poulpy-gpu-cuda
      if: steps.cudacheck.outputs.supported == 'true'
      run: cargo clippy -p poulpy-gpu-cuda --all-targets -- -D warnings

    - name: Tests poulpy-gpu-cuda
      if: steps.cudacheck.outputs.supported == 'true'
      run: cargo test -p poulpy-gpu-cuda
